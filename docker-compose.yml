services:
  db:
    image: postgres:17-alpine
    container_name: elhafazah_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elhafazah
    ports:
      - "5433:5432"
    volumes:
      - elhafazah_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elhafazah"]
      interval: 5s
      timeout: 5s
      retries: 5

  # تطبيق Next.js (واجهة + خادم)
  app:
    build: .
    container_name: elhafazah_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/elhafazah
      AUTH_SECRET: ${AUTH_SECRET:-elhafazah-local-docker-secret-please-change-32}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8080}
      NODE_ENV: production
    # المنفذ على الجهاز قابل للضبط عبر APP_PORT (الافتراضي 8080)؛ الحاوية داخلياً تستمع على 3000
    ports:
      - "${APP_PORT:-8080}:3000"

  # بذر بيانات القرآن + حساب الأدمن (يُشغَّل مرّة واحدة عند الحاجة)
  # التشغيل: docker compose --profile seed run --rm seed
  seed:
    build:
      context: .
      target: builder
    profiles: ["seed"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/elhafazah
    command: sh -c "node scripts/seed-quran.mjs && node scripts/seed-quran-layout.mjs && node scripts/seed-admin.mjs"

volumes:
  elhafazah_pgdata:
